<html lang="en">
  <head>
    <meta charset="UTF-8" />

      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/decodages-homepage.css" />
    <link rel="stylesheet" href="styles/feedback.css" />
  </head>
  <body>
    <div class="page-title">
      <h1 class="title">Les Décodages</h1>
    </div>
    <hr />
    <h2>Les Pokés :</h2>
    <div class="pokes-container">
      <button>
        <a href="decodages/POKÉ-01/POKÉ-01.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>

      </button>
      <button>
        <a href="decodages/POKÉ-02/POKÉ-02.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        POKÉ - 02
      </button>
      <button>
        <a href="decodages/POKÉ-03/POKÉ-03.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        POKÉ - 03
      </button>
      <button>
        <a href="decodages/POKÉ-04/POKÉ-04.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        POKÉ - 04
      </button>
    </div>

    <h2>Les Horlas :</h2>
    <div class="horla-container">
      <button>
        <a href="decodages/horla-01/le-horla-01.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        Le Horla - 01
      </button>
      <button>
        <a href="decodages/horla-02/le-horla-02.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        Le Horla - 02
      </button>
      <button>
        <a href="decodages/horla-03/le-horla-03.html">
          <img src="images/psyduck.jpg" alt="Une image de Psykokwak" />
        </a>
        Le Horla - 03
      </button>
    </div>
    <div class="form" id="form">
      <form action="https://formspree.io/f/mojozkwp" method="POST">
        <label for="name">Name : </label><br />
        <input type="text" id="name" name="name" required /><br />
        <label for="email">Email Address : </label><br />
        <input type="email" id="email" name="email" /><br />
        <label for="Message">Message : </label><br />
        <textarea id="Message" cols="45" rows="5" name="message"></textarea
        ><br />
        <input type="submit" value="Submit" class="submit-but" />
      </form>
    </div>

    <div>
      <button
        class="feedback-but"
        id="feedback"
        onclick="
          const myForm = document.getElementById('form');
          const visibilityStatus = myForm.style.visibility;
          if (visibilityStatus === 'visible') {
            myForm.style.visibility = 'hidden';
          }
          else{
            myForm.style.visibility = 'visible';
          }
        "
      >
        Feedback
      </button>
  </body>
</html>
