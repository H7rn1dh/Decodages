<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="Décodage, Salish French 10" />
    <title>Décodages</title>
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/feedback.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Décodages</title>
  </head>

  <body>
    <h1 class="main-header">Bienvenue!</h1>
    <h2 class="scnd-header">Choisissez un ci-dessus</h2>

    <div class="container">
      <button class="revise-button">
        <a href="decodages-homepage.html">
          <img
            src="images/psyduck.jpg"
            alt="Une image de Psykokwak" 
            class="psyduck"
          />
        </a>
        Revisez les décodages
      </button>

      <button class="evaluate-button">
        <a href="">
          <img
            src="images/ninetales.jpg"
            alt="Une image de Feunard"
            class="ninetails"
          />
        </a>
        Évaluer vos compétences
      </button>
    </div>
    <div class="form" id="form">
      <form action="https://formspree.io/f/mojozkwp" method="POST">
        <label for="name">Name : </label><br />
        <input type="text" id="name" name="name" required /><br />
        <label for="email">Email Address : </label><br />
        <input type="email" id="email" name="email" /><br />
        <label for="Message">Message : </label><br />
        <textarea id="Message" cols="45" rows="5" name="message"></textarea
        ><br />
        <input type="submit" value="Submit" class="submit-but" />
      </form>
    </div>

    <div>
      <button
        class="feedback-but"
        id="feedback"
        onclick="
          const myForm = document.getElementById('form');
          const visibilityStatus = myForm.style.visibility;
          if (visibilityStatus === 'visible') {
            myForm.style.visibility = 'hidden';
          }
          else{
            myForm.style.visibility = 'visible';
          }
        "
      >
        Feedback
      </button>
  </body>
</html>
